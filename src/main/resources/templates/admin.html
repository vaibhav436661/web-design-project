<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>All Leads</h2>

<table border="1">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Message</th>
</tr>

<tr th:each="c : ${list}">
<td th:text="${c.name}"></td>
<td th:text="${c.phone}"></td>
<td th:text="${c.message}"></td>
</tr>

</table>

</body>
</html>
